<svg preserveAspectRatio="none" width="100%" height="100%" overflow="visible" style="display: block;" viewBox="0 0 44 44" fill="none" xmlns="http://www.w3.org/2000/svg">
<style>
  @keyframes flap-left {
    from {
      transform: rotate(-20deg);
    }
    to {
      transform: rotate(10deg);
    }
  }
  @keyframes flap-right {
    from {
      transform: rotate(20deg);
    }
    to {
      transform: rotate(-10deg);
    }
  }
  @keyframes wag-tail {
    from {
      transform: rotate(-4deg);
    }
    to {
      transform: rotate(4deg);
    }
  }
  @keyframes bob-bird {
    from {
      transform: translateY(0.4px);
    }
    to {
      transform: translateY(-0.4px);
    }
  }
  
  .left-wing {
    transform-origin: 21.5px 18.1px;
    animation: flap-left var(--flap-duration, 0.15s) ease-in-out infinite alternate;
  }
  .right-wing {
    transform-origin: 22.6px 13.8px;
    animation: flap-right var(--flap-duration, 0.15s) ease-in-out infinite alternate;
  }
  .tail {
    transform-origin: 22px 19.5px;
    animation: wag-tail var(--flap-duration, 0.15s) ease-in-out infinite alternate;
  }
  .bird-body {
    animation: bob-bird var(--flap-duration, 0.15s) ease-in-out infinite alternate;
  }
</style>
